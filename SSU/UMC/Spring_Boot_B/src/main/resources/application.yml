spring:
  application:
    name: Spring_Boot_B
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}
  profiles:
    active: local


  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
social:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}


jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_TOKEN_EXPIRATION}
  refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION}


logging:
  discord:
    web-hook-url: https://discord.com/api/webhooks/1410179787107991572/2vFFuEbOysRrHXoLEwUBOx18ODLQnJWVeTmt9Lf-Qt0pKhSGGIS1IzFN-ftgyH0i